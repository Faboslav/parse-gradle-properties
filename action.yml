name: Parse Gradle Properties
description: Parse gradle.properties into GitHub Actions outputs
author: Faboslav

branding:
  icon: file-text
  color: green

inputs:
  files:
    description: Paths to gradle.properties files, separated by commas or new lines. Later files override earlier outputs.
    required: false
    default: gradle.properties
  ignore-keys:
    description: Comma-separated keys or prefixes to ignore
    required: false
    default: org.gradle

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        chmod +x "${{ github.action_path }}/parseGradleProperties.sh"
        "${{ github.action_path }}/parseGradleProperties.sh" \
          "${{ inputs.files }}" \
          "${{ inputs.ignore-keys }}" >> "$GITHUB_OUTPUT"